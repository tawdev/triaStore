name: Deploy TriaStor

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/triaStore
            
            # Pull latest changes
            git checkout frontend/package.json package-lock.json
            git pull origin main
            
            # Update Backend
            cd backend
            npm install
            npm run build
            pm2 restart tria-backend
            
            # Update Frontend
            cd ../frontend
            npm install
            npm run build
            pm2 restart tria-frontend
            
            # Cleanup PM2
            pm2 save
