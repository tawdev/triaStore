name: Deploy Animal Food Express

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/animal2
            
            # Pull latest changes
            git pull origin main
            
            # Update Backend
            cd backend/droguerie-backend
            npm install
            npm run build
            pm2 restart animal-backend
            
            # Update Frontend
            cd ../..
            npm install
            npm run build
            pm2 restart animal-frontend
            
            # Cleanup PM2
            pm2 save
